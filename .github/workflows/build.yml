name: Build Android APK

on:
  push:
    branches: [ main, master, feature/ceph-autodetect ]
  workflow_dispatch:

jobs:
  build:
    name: Install and Build Android APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: 'temurin'

      - name: Install dependencies
        run: |
          npm install --legacy-peer-deps

      - name: Fix onnxruntime-react-native Gradle dependency
        run: |
          sed -i 's/onnxruntime-android:latest\.integration@aar/onnxruntime-android:1.24.3@aar/g' \
            node_modules/onnxruntime-react-native/android/build.gradle
          sed -i 's/onnxruntime-android-qnn:latest\.integration@aar/onnxruntime-android-qnn:1.24.3@aar/g' \
            node_modules/onnxruntime-react-native/android/build.gradle
          echo "Patched build.gradle:"
          grep "onnxruntime-android" node_modules/onnxruntime-react-native/android/build.gradle

      - name: Generate native Android directory
        run: npx expo prebuild --platform android --no-install

      - name: Set executable permission for Gradlew
        run: chmod +x android/gradlew

      - name: Build Android Debug APK (with bundled JS)
        env:
          GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx3072m -XX:MaxMetaspaceSize=512m"
        run: |
          cd android
          ./gradlew assembleDebug -PbundleInDebug=true --no-daemon --stacktrace

      - name: Upload Debug APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: oci-analyzer-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
